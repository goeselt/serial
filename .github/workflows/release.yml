---
name: Release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      id-token: write
      attestations: write
    steps:
      - id: app
        name: Generate App Token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_KEY }}

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0 # bumpkin needs full history to find the previous release tag
          token: ${{ steps.app.outputs.token }}

      - id: bumpkin
        name: Resolve Version
        uses: goeselt/bumpkin@8e5d31105440aa42cd53d50b22c954be38bc2dd0 # v1.0.1
        with:
          initial-version: '1.0.0'

      - name: Set Up Go
        if: steps.bumpkin.outputs.release-needed == 'true'
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Build Release Assets
        if: steps.bumpkin.outputs.release-needed == 'true'
        run: make release-assets

      - name: Ship
        if: steps.bumpkin.outputs.release-needed == 'true'
        uses: goeselt/shipit@54c7a651030061bb138975718850d0248ac683a9 # v1.0.2
        with:
          release-tag: ${{ steps.bumpkin.outputs.release-tag }}
          assets: |
            dist/*.tar.gz
            dist/checksums.txt
          github-token: ${{ steps.app.outputs.token }}
          git-user-name: ${{ vars.RELEASE_SIGNING_USER }}
          git-user-email: ${{ vars.RELEASE_SIGNING_EMAIL }}
          signing-key: ${{ secrets.RELEASE_SIGNING_KEY }}

      - name: Attest Build Provenance
        if: steps.bumpkin.outputs.release-needed == 'true'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            dist/*.tar.gz
            dist/checksums.txt
